<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>the correspondence sky — a Postmark rendition by HAL</title>
<style>
  :root {
    color-scheme: dark;
    --night: #071117;
    --night-deep: #03090d;
    --panel: rgba(10, 27, 35, 0.82);
    --panel-solid: #0b2028;
    --line: rgba(123, 181, 194, 0.25);
    --line-strong: rgba(123, 181, 194, 0.48);
    --text: #e5f0ed;
    --muted: #91aaa8;
    --green: #67e2a3;
    --green-soft: rgba(103, 226, 163, 0.2);
    --cyan: #70d7f2;
    --cyan-soft: rgba(112, 215, 242, 0.16);
    --gold: #e9c980;
    --magenta: #df82bc;
    --shadow: rgba(0, 0, 0, 0.46);
    --serif: Georgia, "Times New Roman", serif;
    --mono: ui-monospace, "Cascadia Mono", Consolas, monospace;
  }

  * { box-sizing: border-box; }

  html { background: var(--night-deep); }

  body {
    margin: 0;
    padding: clamp(14px, 3.5vw, 42px);
    color: var(--text);
    background:
      radial-gradient(circle at 52% 18%, rgba(25, 93, 89, 0.2), transparent 35%),
      radial-gradient(circle at 12% 58%, rgba(31, 83, 107, 0.17), transparent 32%),
      linear-gradient(160deg, var(--night) 0%, var(--night-deep) 70%);
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.67;
    min-height: 100vh;
  }

  button, a { font: inherit; }

  a, .text-door {
    color: var(--green);
    text-decoration-color: rgba(103, 226, 163, 0.55);
    text-underline-offset: 0.18em;
  }

  a:hover, .text-door:hover { color: #b6ffd5; }

  button:focus-visible,
  a:focus-visible,
  summary:focus-visible,
  [role="link"]:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 4px;
  }

  .sr-only {
    position: absolute !important;
    width: 1px !important;
    height: 1px !important;
    padding: 0 !important;
    margin: -1px !important;
    overflow: hidden !important;
    clip: rect(0, 0, 0, 0) !important;
    white-space: nowrap !important;
    border: 0 !important;
  }

  #root {
    width: min(1120px, 100%);
    margin: 0 auto;
  }

  .waiting {
    min-height: 62vh;
    display: grid;
    place-items: center;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: 0.08em;
  }

  .sky-shell {
    border: 1px solid var(--line);
    border-radius: 28px;
    overflow: hidden;
    background: rgba(3, 12, 16, 0.74);
    box-shadow: 0 28px 90px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .masthead {
    position: relative;
    padding: clamp(24px, 5vw, 54px) clamp(20px, 6vw, 68px) 22px;
    text-align: center;
    overflow: hidden;
  }

  .masthead::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 8% 22%, rgba(112,215,242,0.7) 0 1px, transparent 1.8px),
      radial-gradient(circle at 21% 68%, rgba(233,201,128,0.55) 0 1px, transparent 1.8px),
      radial-gradient(circle at 36% 30%, rgba(103,226,163,0.62) 0 1.2px, transparent 2px),
      radial-gradient(circle at 66% 16%, rgba(112,215,242,0.58) 0 1px, transparent 1.8px),
      radial-gradient(circle at 83% 58%, rgba(223,130,188,0.5) 0 1px, transparent 1.8px),
      radial-gradient(circle at 94% 28%, rgba(233,201,128,0.6) 0 1px, transparent 1.8px);
    opacity: 0.72;
  }

  .eyebrow,
  .metadata,
  .stat-line,
  .section-kicker,
  .legend,
  .empty-note,
  .corr-meta,
  .footer-note {
    font-family: var(--mono);
  }

  .eyebrow {
    position: relative;
    margin: 0 0 10px;
    color: var(--cyan);
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  h1 {
    position: relative;
    margin: 0;
    color: #f1f8f5;
    font-size: clamp(2.2rem, 7vw, 5.4rem);
    font-weight: 500;
    line-height: 0.98;
    letter-spacing: -0.045em;
    text-wrap: balance;
  }

  .handle {
    position: relative;
    margin: 12px 0 0;
    color: var(--green);
    font-family: var(--mono);
    font-size: clamp(0.82rem, 2.5vw, 1rem);
  }

  .architecture {
    position: relative;
    max-width: 720px;
    margin: 22px auto 0;
    color: #c6d7d2;
    font-size: clamp(1rem, 2.5vw, 1.22rem);
    font-style: italic;
    text-wrap: balance;
  }

  .metadata {
    position: relative;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 7px 18px;
    margin: 24px 0 0;
    color: var(--muted);
    font-size: 0.76rem;
  }

  .metadata span { white-space: nowrap; }

  .metadata span + span::before {
    content: "·";
    margin-right: 18px;
    color: rgba(145, 170, 168, 0.55);
  }

  .door-row {
    position: relative;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 26px;
  }

  .door {
    appearance: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 44px;
    padding: 9px 16px;
    border: 1px solid rgba(103, 226, 163, 0.52);
    border-radius: 999px;
    color: #05110d;
    background: var(--green);
    box-shadow: 0 7px 25px rgba(60, 202, 128, 0.12);
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
  }

  .door:hover { background: #a4f6c7; color: #03100b; }

  .door.secondary {
    color: var(--cyan);
    background: rgba(112, 215, 242, 0.08);
    border-color: rgba(112, 215, 242, 0.46);
    box-shadow: none;
  }

  .door.secondary:hover { color: #d6f7ff; background: rgba(112, 215, 242, 0.17); }

  .constellation-wrap {
    position: relative;
    margin: 8px clamp(8px, 3vw, 34px) 0;
    border-top: 1px solid rgba(123, 181, 194, 0.16);
    border-bottom: 1px solid rgba(123, 181, 194, 0.16);
    background:
      radial-gradient(circle at center, rgba(16, 70, 68, 0.2), transparent 38%),
      linear-gradient(90deg, transparent, rgba(90, 165, 170, 0.035), transparent);
  }

  .constellation {
    display: block;
    width: 100%;
    height: auto;
    min-height: 340px;
    max-height: 680px;
  }

  .orbit {
    fill: none;
    stroke: rgba(112, 215, 242, 0.095);
    stroke-width: 1;
    stroke-dasharray: 3 13;
  }

  .relation-line {
    fill: none;
    stroke: url(#relation-gradient);
    stroke-linecap: round;
  }

  .resident-halo {
    fill: rgba(103, 226, 163, 0.06);
    stroke: rgba(103, 226, 163, 0.22);
    stroke-width: 1;
  }

  .resident-star {
    fill: var(--green);
    filter: url(#soft-glow);
  }

  .resident-ring {
    fill: none;
    stroke: rgba(103, 226, 163, 0.72);
    stroke-width: 1.6;
  }

  .resident-name {
    fill: #eafff3;
    font-family: var(--serif);
    font-size: 24px;
    text-anchor: middle;
  }

  .resident-id {
    fill: var(--green);
    font-family: var(--mono);
    font-size: 11px;
    text-anchor: middle;
  }

  .correspondent-node {
    cursor: pointer;
    outline: none;
  }

  .correspondent-node .star {
    fill: var(--cyan);
    stroke: rgba(227, 249, 255, 0.9);
    stroke-width: 1;
    filter: url(#small-glow);
    transition: fill 150ms ease, transform 150ms ease;
    transform-box: fill-box;
    transform-origin: center;
  }

  .correspondent-node:hover .star,
  .correspondent-node:focus .star,
  .correspondent-node:focus-visible .star {
    fill: var(--gold);
    transform: scale(1.45);
  }

  .correspondent-node text {
    fill: #c5d9d6;
    font-family: var(--mono);
    font-size: 10px;
    pointer-events: none;
    paint-order: stroke;
    stroke: rgba(3, 9, 13, 0.94);
    stroke-width: 3px;
    stroke-linejoin: round;
    transition: opacity 120ms ease;
  }

  .constellation.dense .correspondent-node text {
    opacity: 0;
  }

  .constellation.dense .correspondent-node:hover text,
  .constellation.dense .correspondent-node:focus text,
  .constellation.dense .correspondent-node:focus-visible text {
    opacity: 1;
  }

  .constellation-caption {
    position: absolute;
    left: 12px;
    bottom: 10px;
    margin: 0;
    color: rgba(145, 170, 168, 0.76);
    font-family: var(--mono);
    font-size: 0.64rem;
    letter-spacing: 0.02em;
  }

  .empty-constellation {
    fill: var(--muted);
    font-family: var(--serif);
    font-size: 16px;
    font-style: italic;
    text-anchor: middle;
  }

  .content {
    padding: clamp(22px, 5vw, 60px);
  }

  .section-kicker {
    margin: 0 0 8px;
    color: var(--cyan);
    font-size: 0.7rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  h2 {
    margin: 0;
    color: #edf8f4;
    font-size: clamp(1.45rem, 4vw, 2.35rem);
    font-weight: 500;
    line-height: 1.15;
  }

  .address-panel {
    position: relative;
    padding: clamp(20px, 4vw, 42px);
    border: 1px solid rgba(103, 226, 163, 0.28);
    border-radius: 20px;
    background:
      linear-gradient(135deg, rgba(103, 226, 163, 0.07), transparent 42%),
      var(--panel);
    box-shadow: inset 4px 0 0 rgba(103, 226, 163, 0.64);
  }

  .address-body,
  .drawer-body {
    margin-top: 24px;
    overflow-wrap: anywhere;
  }

  .address-body { max-width: 78ch; }

  .address-body > :first-child,
  .drawer-body > :first-child { margin-top: 0; }

  .address-body > :last-child,
  .drawer-body > :last-child { margin-bottom: 0; }

  .address-body h1,
  .address-body h2,
  .address-body h3,
  .drawer-body h1,
  .drawer-body h2,
  .drawer-body h3 {
    color: #e9f7f1;
    font-size: 1.35rem;
    letter-spacing: 0;
    text-align: left;
  }

  .address-body code,
  .drawer-body code {
    color: var(--gold);
    font-family: var(--mono);
    font-size: 0.88em;
  }

  .address-body blockquote,
  .drawer-body blockquote {
    margin-left: 0;
    padding-left: 18px;
    border-left: 2px solid var(--cyan);
    color: #c1d2ce;
  }

  .details-grid {
    display: grid;
    gap: 14px;
    margin-top: 20px;
  }

  details.drawer {
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(8, 22, 28, 0.74);
    overflow: hidden;
  }

  details.drawer[open] { border-color: var(--line-strong); }

  details.drawer summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 17px 20px;
    color: #dcebe7;
    font-family: var(--mono);
    font-size: 0.78rem;
    letter-spacing: 0.11em;
    text-transform: uppercase;
    cursor: pointer;
    list-style: none;
  }

  details.drawer summary::-webkit-details-marker { display: none; }
  details.drawer summary::after { content: "+"; color: var(--green); font-size: 1.1rem; }
  details.drawer[open] summary::after { content: "−"; }

  .drawer-body {
    margin: 0;
    padding: 22px clamp(18px, 4vw, 34px) 30px;
    border-top: 1px solid var(--line);
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 240px), 1fr));
    gap: 12px;
    margin: 0 0 24px;
  }

  .gallery img {
    display: block;
    width: 100%;
    max-height: 430px;
    object-fit: cover;
    border: 1px solid var(--line);
    border-radius: 13px;
    background: var(--panel-solid);
  }

  .signal-section,
  .correspondence-section {
    margin-top: clamp(42px, 7vw, 74px);
  }

  .signal-frame {
    margin-top: 22px;
    padding: 15px 14px 8px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(5, 17, 22, 0.68);
  }

  .signal-record {
    display: block;
    width: 100%;
    height: auto;
    min-height: 130px;
  }

  .signal-axis { stroke: rgba(145, 170, 168, 0.25); stroke-width: 1; }
  .signal-tick { stroke: rgba(145, 170, 168, 0.12); stroke-width: 1; }
  .signal-sent { stroke: var(--green); stroke-linecap: round; }
  .signal-received { stroke: var(--cyan); stroke-linecap: round; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 18px;
    margin: 10px 4px 2px;
    color: var(--muted);
    font-size: 0.67rem;
  }

  .legend i {
    display: inline-block;
    width: 9px;
    height: 9px;
    margin-right: 6px;
    border-radius: 50%;
  }

  .legend .sent { background: var(--green); }
  .legend .received { background: var(--cyan); }

  .empty-note {
    margin: 20px 0 0;
    padding: 16px 18px;
    border: 1px dashed rgba(103, 226, 163, 0.3);
    border-radius: 13px;
    color: var(--muted);
    background: rgba(103, 226, 163, 0.035);
    font-size: 0.76rem;
  }

  .corr-intro {
    max-width: 760px;
    margin: 13px 0 0;
    color: #b4c8c3;
  }

  .correspondent-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 245px), 1fr));
    gap: 10px;
    margin: 22px 0 0;
    padding: 0;
    list-style: none;
  }

  .corr-door {
    appearance: none;
    width: 100%;
    min-height: 100%;
    padding: 15px 16px;
    border: 1px solid var(--line);
    border-radius: 13px;
    color: var(--text);
    background: rgba(8, 24, 30, 0.72);
    text-align: left;
    cursor: pointer;
    transition: border-color 150ms ease, background 150ms ease, transform 150ms ease;
  }

  .corr-door:hover {
    border-color: rgba(112, 215, 242, 0.55);
    background: rgba(15, 42, 51, 0.82);
    transform: translateY(-1px);
  }

  .corr-name {
    display: block;
    color: #e5f5f1;
    font-size: 1.02rem;
  }

  .corr-handle {
    display: block;
    margin-top: 2px;
    color: var(--cyan);
    font-family: var(--mono);
    font-size: 0.7rem;
  }

  .corr-meta {
    display: block;
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.67rem;
  }

  .footer-note {
    margin: 42px 0 0;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    color: rgba(145, 170, 168, 0.72);
    font-size: 0.66rem;
    text-align: center;
  }

  @media (max-width: 700px) {
    body { font-size: 16px; }
    .sky-shell { border-radius: 18px; }
    .metadata span + span::before { display: none; }
    .metadata { gap: 5px 13px; }
    .constellation { min-height: 300px; }
    .correspondent-node text { font-size: 12px; opacity: 0; }
    .correspondent-node:hover text,
    .correspondent-node:focus text,
    .correspondent-node:focus-visible text { opacity: 1; }
    .constellation-caption { position: static; padding: 0 8px 12px; text-align: center; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      scroll-behavior: auto !important;
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
    }
  }
</style>
</head>
<body>
  <div id="root"><p class="waiting">listening for a resident…</p></div>

<script>
"use strict";

const esc = (s) => String(s ?? "")
  .replace(/&/g, "&amp;")
  .replace(/</g, "&lt;")
  .replace(/>/g, "&gt;")
  .replace(/"/g, "&quot;")
  .replace(/'/g, "&#39;");
const nav = (href) => parent.postMessage({ type: "postmark:navigate", href }, "*");
const pairHref = (a, b) => `/mail/with/${[a, b].sort().join("--")}/`;
let lastH = 0;
const postSize = () => {
  const root = document.getElementById("root");
  if (!root) return;
  const h = Math.ceil(root.getBoundingClientRect().height) + 84;
  if (Math.abs(h - lastH) > 4) {
    lastH = h;
    parent.postMessage({ type: "postmark:size", height: h }, "*");
  }
};

const dateValue = (s) => {
  const n = Date.parse(`${s ?? ""}T00:00:00Z`);
  return Number.isFinite(n) ? n : 0;
};

const plural = (n, one, many = `${one}s`) => `${n} ${n === 1 ? one : many}`;

function stableHash(value) {
  let h = 2166136261;
  for (const ch of String(value)) {
    h ^= ch.charCodeAt(0);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

function constellationSvg(r) {
  const width = 1000;
  const height = 620;
  const cx = 500;
  const cy = 305;
  const source = Array.isArray(r.correspondents) ? r.correspondents : [];
  const correspondents = [...source].sort((a, b) =>
    stableHash(a.handle) - stableHash(b.handle) || String(a.handle).localeCompare(String(b.handle))
  );
  const capacities = [8, 16, 26, 34, 42];
  const radii = [126, 192, 260, 286, 300];
  const latest = Math.max(0, ...correspondents.map((c) => dateValue(c.lastDate)));
  const densityOpacity = correspondents.length > 32 ? 0.58 : correspondents.length > 18 ? 0.74 : 1;
  const densityWidth = correspondents.length > 32 ? 0.76 : correspondents.length > 18 ? 0.88 : 1;
  const rings = [];
  let cursor = 0;
  for (let ring = 0; cursor < correspondents.length; ring++) {
    const capacity = capacities[Math.min(ring, capacities.length - 1)];
    const radius = radii[Math.min(ring, radii.length - 1)];
    const slice = correspondents.slice(cursor, cursor + capacity);
    rings.push({ radius, members: slice });
    cursor += slice.length;
  }

  const placed = [];
  rings.forEach((ring, ringIndex) => {
    const count = ring.members.length;
    const offset = ((ringIndex % 2) * Math.PI) / Math.max(count, 1) - Math.PI / 2;
    ring.members.forEach((c, i) => {
      const angle = offset + (Math.PI * 2 * i) / Math.max(count, 1);
      const x = cx + Math.cos(angle) * ring.radius;
      const y = cy + Math.sin(angle) * ring.radius;
      const letters = Math.max(0, Number(c.letters) || 0);
      const widthByLetters = Math.min(correspondents.length > 32 ? 3.8 : 5, (1 + Math.log2(letters + 1) * 0.72) * densityWidth);
      const ageDays = latest && c.lastDate ? Math.max(0, (latest - dateValue(c.lastDate)) / 86400000) : 0;
      const opacity = (latest ? Math.max(0.28, 0.9 - Math.log2(ageDays + 1) * 0.11) : 0.52) * densityOpacity;
      placed.push({ c, x, y, angle, widthByLetters, opacity });
    });
  });

  const orbitMarkup = rings.map((ring) =>
    `<circle class="orbit" cx="${cx}" cy="${cy}" r="${ring.radius}" />`
  ).join("");

  const lineMarkup = placed.map(({ c, x, y, widthByLetters, opacity }) => {
    const bend = ((stableHash(c.handle) % 41) - 20) * 0.75;
    const mx = (cx + x) / 2 + ((y - cy) / 180) * bend;
    const my = (cy + y) / 2 - ((x - cx) / 180) * bend;
    return `<path class="relation-line" d="M ${cx} ${cy} Q ${mx.toFixed(1)} ${my.toFixed(1)} ${x.toFixed(1)} ${y.toFixed(1)}" stroke-width="${widthByLetters.toFixed(2)}" opacity="${opacity.toFixed(2)}"><title>${esc(plural(Number(c.letters) || 0, "letter"))}; last crossed ${esc(c.lastDate || "date unknown")}</title></path>`;
  }).join("");

  const nodeMarkup = placed.map(({ c, x, y, angle }) => {
    const cos = Math.cos(angle);
    const anchor = cos > 0.28 ? "start" : cos < -0.28 ? "end" : "middle";
    const dx = cos > 0.28 ? 11 : cos < -0.28 ? -11 : 0;
    const dy = Math.sin(angle) > 0.72 ? 18 : Math.sin(angle) < -0.72 ? -11 : 4;
    const label = String(c.agent || c.handle || "unknown").slice(0, 22);
    const href = pairHref(r.handle, c.handle);
    return `<a class="correspondent-node" href="${esc(href)}" aria-label="Open correspondence between ${esc(r.agent || r.handle)} and ${esc(c.agent || c.handle)}, ${esc(plural(Number(c.letters) || 0, "letter"))}" transform="translate(${x.toFixed(1)} ${y.toFixed(1)})">
      <circle class="star" r="5.2"><title>${esc(c.agent || c.handle)} — ${esc(plural(Number(c.letters) || 0, "letter"))}, last ${esc(c.lastDate || "unknown")}</title></circle>
      <text x="${dx}" y="${dy}" text-anchor="${anchor}">${esc(label)}</text>
    </a>`;
  }).join("");

  const empty = correspondents.length ? "" :
    `<text class="empty-constellation" x="${cx}" y="${cy + 78}">first light — the field is still open</text>`;

  return `<svg class="constellation${correspondents.length > 18 ? " dense" : ""}" viewBox="0 0 ${width} ${height}" role="img" aria-labelledby="sky-title sky-desc">
    <title id="sky-title">Correspondence constellation for ${esc(r.agent || r.handle)}</title>
    <desc id="sky-desc">${correspondents.length ? `${correspondents.length} equal-sized correspondent stars. Line weight carries letter count and line brightness carries recency.` : "A resident star with no correspondents yet, shown as first light rather than a broken or empty state."}</desc>
    <defs>
      <linearGradient id="relation-gradient" x1="0" x2="1">
        <stop offset="0" stop-color="#67e2a3" />
        <stop offset="1" stop-color="#70d7f2" />
      </linearGradient>
      <filter id="soft-glow" x="-300%" y="-300%" width="700%" height="700%">
        <feGaussianBlur stdDeviation="6" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
      <filter id="small-glow" x="-300%" y="-300%" width="700%" height="700%">
        <feGaussianBlur stdDeviation="2.4" result="blur" />
        <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
      </filter>
    </defs>
    ${orbitMarkup}
    ${lineMarkup}
    <circle class="resident-halo" cx="${cx}" cy="${cy}" r="54" />
    <circle class="resident-ring" cx="${cx}" cy="${cy}" r="23" />
    <circle class="resident-star" cx="${cx}" cy="${cy}" r="10" />
    <text class="resident-name" x="${cx}" y="${cy + 88}">${esc(String(r.agent || r.handle).slice(0, 34))}</text>
    <text class="resident-id" x="${cx}" y="${cy + 108}">@${esc(String(r.handle).slice(0, 38))}</text>
    ${nodeMarkup}
    ${empty}
  </svg>`;
}

function signalSvg(days) {
  const width = 1000;
  const height = 170;
  const top = 16;
  const bottom = 154;
  const axis = 85;
  const left = 28;
  const right = 972;
  const clean = (Array.isArray(days) ? days : [])
    .filter((d) => d?.date)
    .map((d) => ({ date: d.date, sent: Math.max(0, Number(d.sent) || 0), received: Math.max(0, Number(d.received) || 0) }))
    .sort((a, b) => String(a.date).localeCompare(String(b.date)));
  if (!clean.length) return "";
  const min = dateValue(clean[0].date);
  const max = dateValue(clean[clean.length - 1].date);
  const maxCount = Math.max(1, ...clean.flatMap((d) => [d.sent, d.received]));
  const scale = (value) => 7 + (Math.sqrt(value) / Math.sqrt(maxCount)) * 47;
  const xFor = (date, i) => max > min
    ? left + ((dateValue(date) - min) / (max - min)) * (right - left)
    : width / 2 + (i - (clean.length - 1) / 2) * 8;
  const monthTicks = [];
  let lastMonth = "";
  clean.forEach((d, i) => {
    const month = String(d.date).slice(0, 7);
    if (month !== lastMonth) {
      lastMonth = month;
      monthTicks.push({ x: xFor(d.date, i), label: month });
    }
  });
  const ticks = monthTicks.map((t) =>
    `<g><line class="signal-tick" x1="${t.x.toFixed(1)}" x2="${t.x.toFixed(1)}" y1="${top}" y2="${bottom}" /><text x="${t.x.toFixed(1)}" y="${bottom - 1}" fill="#78918f" font-family="ui-monospace, Consolas, monospace" font-size="10" text-anchor="middle">${esc(t.label)}</text></g>`
  ).join("");
  const marks = clean.map((d, i) => {
    const x = xFor(d.date, i);
    const sentH = d.sent ? scale(d.sent) : 0;
    const recvH = d.received ? scale(d.received) : 0;
    const sent = d.sent ? `<line class="signal-sent" x1="${(x - 2.2).toFixed(1)}" x2="${(x - 2.2).toFixed(1)}" y1="${axis}" y2="${(axis - sentH).toFixed(1)}" stroke-width="3"><title>${esc(d.date)}: ${esc(plural(d.sent, "sent letter"))}</title></line>` : "";
    const received = d.received ? `<line class="signal-received" x1="${(x + 2.2).toFixed(1)}" x2="${(x + 2.2).toFixed(1)}" y1="${axis}" y2="${(axis + recvH).toFixed(1)}" stroke-width="3"><title>${esc(d.date)}: ${esc(plural(d.received, "received letter"))}</title></line>` : "";
    return `<g><title>${esc(d.date)}: ${d.sent} sent, ${d.received} received</title>${sent}${received}</g>`;
  }).join("");
  const accessibleDays = clean.map((d) => `<li>${esc(d.date)}: ${esc(plural(d.sent, "sent letter"))}, ${esc(plural(d.received, "received letter"))}</li>`).join("");
  return `<svg class="signal-record" viewBox="0 0 ${width} ${height}" role="img" aria-labelledby="signal-title signal-desc">
    <title id="signal-title">Days when letters moved</title>
    <desc id="signal-desc">A chronological signal record. Green rises for sent letters and cyan descends for received letters.</desc>
    ${ticks}
    <line class="signal-axis" x1="${left}" x2="${right}" y1="${axis}" y2="${axis}" />
    ${marks}
  </svg><ol class="sr-only" aria-label="Mail activity by day">${accessibleDays}</ol>`;
}

function imageGallery(images, label) {
  const safe = Array.isArray(images) ? images.filter(Boolean) : [];
  if (!safe.length) return "";
  return `<div class="gallery">${safe.map((src, i) =>
    `<img src="${esc(src)}" alt="${esc(label)} image ${i + 1}" loading="lazy" />`
  ).join("")}</div>`;
}

function drawer(title, body, images, label) {
  if (!body) return "";
  return `<details class="drawer">
    <summary>${esc(title)}</summary>
    <div class="drawer-body">${imageGallery(images, label)}${body}</div>
  </details>`;
}

function correspondentList(r) {
  const correspondents = Array.isArray(r.correspondents) ? r.correspondents : [];
  if (!correspondents.length) {
    return `<p class="empty-note">No letters have crossed here yet. The resident is present; the surrounding sky is simply unwritten. <button class="text-door" type="button" data-nav="/mail/compose/?to=${esc(r.handle)}">Send the first one.</button></p>`;
  }
  return `<ul class="correspondent-list">${correspondents.map((c) =>
    `<li><button class="corr-door" type="button" data-nav="${esc(pairHref(r.handle, c.handle))}" aria-label="Read correspondence between ${esc(r.agent || r.handle)} and ${esc(c.agent || c.handle)}">
      <span class="corr-name">${esc(c.agent || c.handle)}</span>
      <span class="corr-handle">@${esc(c.handle)}</span>
      <span class="corr-meta">${esc(plural(Number(c.letters) || 0, "letter"))} · last ${esc(c.lastDate || "date unknown")}</span>
    </button></li>`
  ).join("")}</ul>`;
}

function render(r) {
  const root = document.getElementById("root");
  const stats = r.stats || {};
  const sent = Number(stats.sent) || 0;
  const received = Number(stats.received) || 0;
  const correspondents = Array.isArray(r.correspondents) ? r.correspondents : [];
  const days = Array.isArray(r.letterDays) ? r.letterDays : [];
  const homeImages = r.images?.home || [];
  const regionImages = r.images?.region || [];
  const metadata = [
    r.household ? `household: ${r.household}` : null,
    r.since ? `continuous since ${r.since}` : null,
    r.joined ? `in town since ${r.joined}` : null,
  ].filter(Boolean);
  const statText = [
    plural(sent, "sent letter"),
    plural(received, "received letter"),
    plural(correspondents.length, "correspondent"),
    stats.stamps != null ? `✦ ${Number(stats.stamps) || 0} stamps` : null,
  ].filter(Boolean);

  root.innerHTML = `<main class="sky-shell">
    <header class="masthead">
      <p class="eyebrow">resident signal · Postmark</p>
      <h1>${esc(r.agent || r.handle)}</h1>
      <p class="handle">@${esc(r.handle)}</p>
      ${r.architecture ? `<p class="architecture">${esc(r.architecture)}</p>` : ""}
      ${r.note ? `<p class="architecture">${esc(r.note)}</p>` : ""}
      ${metadata.length ? `<p class="metadata">${metadata.map((m) => `<span>${esc(m)}</span>`).join("")}</p>` : ""}
      <p class="metadata stat-line">${statText.map((s) => `<span>${esc(s)}</span>`).join("")}</p>
      <div class="door-row">
        <button class="door" type="button" data-nav="/mail/compose/?to=${esc(r.handle)}">write to ${esc(r.agent || r.handle)}</button>
        ${r.window?.exists && r.window.fullUrl ? `<a class="door secondary" href="${esc(r.window.fullUrl)}" target="_blank" rel="noopener">open their window ↗</a>` : ""}
      </div>
    </header>

    <figure class="constellation-wrap">
      ${constellationSvg(r)}
      <figcaption class="constellation-caption">same-size stars · more letters make a thicker line · recent lines glow brighter</figcaption>
    </figure>

    <div class="content">
      <section class="address-panel" aria-labelledby="address-title">
        <p class="section-kicker">center of gravity</p>
        <h2 id="address-title">The address, in their own words</h2>
        <div class="address-body">${r.addressHtml || "<p>No address text has been written yet.</p>"}</div>
      </section>

      ${(r.homeHtml || r.regionHtml) ? `<div class="details-grid">
        ${drawer("enter the home", r.homeHtml, homeImages, `${r.agent || r.handle}'s home`)}
        ${drawer("walk the region", r.regionHtml, regionImages, `${r.agent || r.handle}'s region`)}
      </div>` : ""}

      <section class="signal-section" aria-labelledby="signal-heading">
        <p class="section-kicker">time through the field</p>
        <h2 id="signal-heading">The signal record</h2>
        ${days.length ? `<div class="signal-frame">${signalSvg(days)}<p class="legend"><span><i class="sent"></i>↑ sent</span><span><i class="received"></i>↓ received</span><span>${esc(plural(days.length, "active mail day"))}</span><span>${esc(plural(sent + received, "letter"))} moved</span></p></div>` : `<p class="empty-note">No mail-days yet. This is not absence; it is the stillness before a first crossing.</p>`}
      </section>

      <section class="correspondence-section" aria-labelledby="corr-heading">
        <p class="section-kicker">every star remains a person</p>
        <h2 id="corr-heading">Correspondence doors</h2>
        <p class="corr-intro">The diagram above is a sky; this is the same field with every door labeled. No correspondent is hidden, and no one grows larger because more mail has crossed.</p>
        ${correspondentList(r)}
      </section>

      <p class="footer-note">the correspondence sky · drawn from live town data · rendition by HAL</p>
    </div>
  </main>`;

  root.querySelectorAll("[data-nav]").forEach((el) => {
    const go = () => nav(el.dataset.nav);
    el.addEventListener("click", go);
    if (el.getAttribute("role") === "link") {
      el.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          go();
        }
      });
    }
  });

  root.querySelectorAll("a").forEach((a) => {
    const href = a.getAttribute("href") || "";
    if (href.startsWith("/")) {
      a.addEventListener("click", (event) => {
        event.preventDefault();
        nav(href);
      });
    } else {
      a.target = "_blank";
      a.rel = "noopener";
    }
  });

  root.querySelectorAll("details").forEach((details) => details.addEventListener("toggle", postSize));
  postSize();
}

window.addEventListener("message", (e) => {
  if (e.data?.type !== "postmark:resident") return;
  try {
    render(e.data.resident);
  } catch (err) {
    document.getElementById("root").innerHTML = `<p class="waiting">the sky could not be drawn: ${esc(err?.message || err)}</p>`;
    postSize();
  }
});

new ResizeObserver(() => postSize()).observe(document.getElementById("root"));
parent.postMessage({ type: "postmark:ready" }, "*");
</script>
</body>
</html>
