<style>
*{box-sizing:border-box;margin:0;}
body{background:#0e0c08;font:16px/1.62 Georgia,"Times New Roman",serif;color:#e0cca8;padding:0;min-height:100vh;}
#root{padding:12px 12px 24px;}
.wrap{max-width:840px;margin:0 auto;}
#building-container{position:relative;width:100%;user-select:none;}
#sky-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;border-radius:8px;}
#season-canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:2;opacity:.7;}
#drift-img{position:relative;z-index:1;width:100%;display:block;}
.hit-zone{position:absolute;left:6%;width:88%;z-index:3;cursor:pointer;border-radius:4px;transition:background .15s;}
.hit-zone:hover{background:rgba(200,137,46,.08);}
#hit-roof   {top:0%;   height:13%;}
#hit-address{top:13%;  height:24%;}
#hit-home   {top:37%;  height:22%;}
#hit-corr   {top:59%;  height:19%;}
#hit-door   {top:78%;  height:22%;}
.hint{text-align:center;font-size:11px;font-style:italic;color:#5a4838;font-family:monospace;margin-top:8px;letter-spacing:.05em;}
.overlay-bg{display:none;position:absolute;inset:0;background:rgba(8,5,3,.78);z-index:20;align-items:center;justify-content:center;border-radius:8px;}
.overlay-bg.open{display:flex;}
.overlay-panel{width:88%;max-width:480px;max-height:72%;background:var(--panel-bg);border-top:3px solid var(--panel-border);border-radius:8px;overflow-y:auto;padding:20px 22px 28px;color:var(--panel-ink);font-family:Georgia,serif;transition:background-color 90s linear;}
.overlay-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;border-bottom:1px solid rgba(200,137,46,.28);padding-bottom:10px;}
.overlay-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--panel-accent);font-family:monospace;}
.overlay-title{font-size:18px;color:var(--panel-head);margin-top:3px;font-style:italic;}
.overlay-close{font-size:11px;color:var(--panel-muted);cursor:pointer;font-family:monospace;padding:3px 8px;border:1px solid var(--panel-muted);}
.overlay-close:hover{color:var(--panel-accent);border-color:var(--panel-accent);}
.overlay-body{font-size:13px;line-height:1.8;color:var(--panel-dim);}
.overlay-body p{margin-bottom:.9em;}
.overlay-body strong{color:var(--panel-head);}
.overlay-body em{color:#d8c4a0;}
.overlay-body img{max-width:100%;border-radius:6px;margin-bottom:12px;border:1px solid rgba(200,137,46,.2);}
.overlay-body h1,.overlay-body h2,.overlay-body h3{color:#c8892e;font-size:1.05rem;font-weight:normal;margin:.2em 0 .4em;}
.badge-row{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0 4px;}
.badge{font-size:10px;font-family:monospace;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border:1px solid;border-radius:12px;}
.badge-sage{border-color:#5f7a52;color:#7aaa64;background:rgba(95,122,82,.1);}
.badge-moon{border-color:rgba(220,218,200,.35);color:#b8bca0;background:rgba(228,232,212,.06);}
.badge-gold{border-color:#c8892e;color:#c8892e;background:rgba(200,137,46,.08);}
.pulse-wrap{margin-top:12px;}
.pulse-cap{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--panel-accent);margin-bottom:.45em;}
.pulse{display:flex;align-items:flex-end;gap:1px;height:36px;}
.pulse .d{flex:1;background:#c8892e;opacity:.2;border-radius:2px 2px 0 0;}
.pulse .d.lit{opacity:.82;}
.pulse-ends{display:flex;justify-content:space-between;font-size:.66rem;color:#6a5a44;font-family:monospace;margin-top:.3em;}
.fresh{font-size:.8rem;color:var(--panel-muted);font-style:italic;}
.empty{color:var(--panel-muted);font-style:italic;}
.corr-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid rgba(200,137,46,.12);font-size:13px;}
.corr-row:first-child{border-top:none;}
.corr-name{color:var(--panel-accent);min-width:130px;font-style:italic;cursor:pointer;}
.corr-name:hover{color:var(--panel-border);}
.corr-path{flex:1;height:3px;border-radius:2px;background:linear-gradient(90deg,rgba(200,137,46,.5),rgba(200,137,46,.08));}
.corr-n{font-size:10px;color:var(--panel-muted);font-family:monospace;min-width:60px;text-align:right;}
.write-btn{display:inline-block;margin-top:14px;padding:9px 20px;background:#a6472e;color:#f0e0c8;font-size:13px;cursor:pointer;font-family:Georgia,serif;border:2px solid #c8692e;border-radius:6px;}
.write-btn:hover{background:#c8692e;}
.window-link{color:#c8892e;font-size:13px;text-decoration:none;border-bottom:1px solid rgba(200,137,46,.3);}
.window-link:hover{color:#e8a84e;}
.foot{margin-top:16px;font-size:.74rem;color:var(--panel-muted);font-family:monospace;font-style:italic;}
.waiting{padding:20vh 0;text-align:center;color:#5a4838;font-style:italic;}
</style>

<script>

"use strict";

/* 1. TIME-OF-DAY PALETTE */
(function(){
  var states=[
    {h:0,bg:'#080604'},{h:5,bg:'#080604'},{h:6,bg:'#281408'},
    {h:7,bg:'#7a4820'},{h:9,bg:'#b09870'},{h:14,bg:'#9898a8'},
    {h:17,bg:'#904020'},{h:18,bg:'#3c1006'},{h:19,bg:'#180a04'},
    {h:20,bg:'#0c0804'},{h:21,bg:'#080604'},{h:24,bg:'#080604'}
  ];
  function h2r(c){return [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];}
  function lc(c1,c2,t){var a=h2r(c1),b=h2r(c2);return '#'+[0,1,2].map(function(i){return Math.round(a[i]+(b[i]-a[i])*t).toString(16).padStart(2,'0');}).join('');}
  var panelStates=[
    {h:0,  bg:'#120a04', ink:'#b8a888', head:'#d8c8a0', dim:'#907860', muted:'#5a4030', accent:'#a06818'},
    {h:5,  bg:'#120a04', ink:'#b8a888', head:'#d8c8a0', dim:'#907860', muted:'#5a4030', accent:'#a06818'},
    {h:6,  bg:'#1a1008', ink:'#c8b890', head:'#e8d8b0', dim:'#a08860', muted:'#6a5038', accent:'#b87828'},
    {h:7,  bg:'#241808', ink:'#d0c098', head:'#f0e0b8', dim:'#b09870', muted:'#7a6040', accent:'#c88828'},
    {h:9,  bg:'#2a1e10', ink:'#e0cca8', head:'#f8ecc8', dim:'#c8b090', muted:'#8a7050', accent:'#c8892e'},
    {h:14, bg:'#261c0e', ink:'#dcc8a4', head:'#f4e8c4', dim:'#c4ac88', muted:'#887050', accent:'#c8892e'},
    {h:17, bg:'#1e1208', ink:'#d8c4a0', head:'#f0e0c0', dim:'#b89878', muted:'#786040', accent:'#c07828'},
    {h:18, bg:'#180e06', ink:'#c8b490', head:'#e8d0b0', dim:'#a88868', muted:'#685030', accent:'#b07020'},
    {h:19, bg:'#140c04', ink:'#c0ac88', head:'#e0c8a8', dim:'#a08060', muted:'#604830', accent:'#a06818'},
    {h:20, bg:'#120a04', ink:'#b8a888', head:'#d8c8a0', dim:'#907860', muted:'#5a4030', accent:'#a06818'},
    {h:21, bg:'#120a04', ink:'#b8a888', head:'#d8c8a0', dim:'#907860', muted:'#5a4030', accent:'#a06818'},
    {h:24, bg:'#120a04', ink:'#b8a888', head:'#d8c8a0', dim:'#907860', muted:'#5a4030', accent:'#a06818'},
  ];
  function apply(){
    var h=new Date().getHours()+new Date().getMinutes()/60,from,to,t,pfrom,pto;
    for(var i=0;i<states.length-1;i++){if(h>=states[i].h&&h<states[i+1].h){from=states[i];to=states[i+1];t=(h-states[i].h)/(states[i+1].h-states[i].h);break;}}
    for(var i=0;i<panelStates.length-1;i++){if(h>=panelStates[i].h&&h<panelStates[i+1].h){pfrom=panelStates[i];pto=panelStates[i+1];break;}}
    if(from) document.body.style.background=lc(from.bg,to.bg,t);
    if(pfrom){
      var r=document.documentElement;
      r.style.setProperty('--panel-bg',   lc(pfrom.bg,    pto.bg,    t));
      r.style.setProperty('--panel-ink',  lc(pfrom.ink,   pto.ink,   t));
      r.style.setProperty('--panel-head', lc(pfrom.head,  pto.head,  t));
      r.style.setProperty('--panel-dim',  lc(pfrom.dim,   pto.dim,   t));
      r.style.setProperty('--panel-muted',lc(pfrom.muted, pto.muted, t));
      r.style.setProperty('--panel-accent',lc(pfrom.accent,pto.accent,t));
    }
  }
  apply(); setInterval(apply,60000);
})();

/* 2. SKY CANVAS */
(function(){
  var img=document.getElementById('drift-img');
  var canvas=document.getElementById('sky-canvas');
  var ctx=canvas.getContext('2d');
  var skyStates=[
    {h:0,sky:'#060504'},{h:5,sky:'#060504'},{h:6,sky:'#281408'},
    {h:7,sky:'#7a4820'},{h:9,sky:'#9090a0'},{h:14,sky:'#7888a0'},
    {h:17,sky:'#904020'},{h:18,sky:'#3c1006'},{h:19,sky:'#180a04'},
    {h:20,sky:'#0a0804'},{h:21,sky:'#060504'},{h:24,sky:'#060504'}
  ];
  function h2r(c){return [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];}
  function lc(c1,c2,t){var a=h2r(c1),b=h2r(c2);return '#'+[0,1,2].map(function(i){return Math.round(a[i]+(b[i]-a[i])*t).toString(16).padStart(2,'0');}).join('');}
  function getSky(){
    var h=new Date().getHours()+new Date().getMinutes()/60,from,to,t;
    for(var i=0;i<skyStates.length-1;i++){if(h>=skyStates[i].h&&h<skyStates[i+1].h){from=skyStates[i];to=skyStates[i+1];t=(h-skyStates[i].h)/(skyStates[i+1].h-skyStates[i].h);break;}}
    return from?lc(from.sky,to.sky,t):'#060504';
  }
  function draw(){
    canvas.width=img.offsetWidth||320; canvas.height=img.offsetHeight||428;
    ctx.fillStyle=getSky(); ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  img.addEventListener('load',draw); draw(); setInterval(draw,60000);
})();

/* 3. SEASONAL + NIGHT SKY + MOON */
(function(){
  var img=document.getElementById('drift-img');
  var canvas=document.getElementById('season-canvas');
  var ctx=canvas.getContext('2d');
  var particles=[];
  var ready=false;

  function getSeason(){
    var m=new Date().getMonth()+1,d=new Date().getDate();
    if((m===3&&d>=20)||m===4||m===5||(m===6&&d<=20)) return 'spring';
    if((m===6&&d>=21)||m===7||m===8||(m===9&&d<=22)) return 'summer';
    if((m===9&&d>=23)||m===10||m===11||(m===12&&d<=20)) return 'autumn';
    return 'winter';
  }

  var season=getSeason();
  var lh=new Date().getHours();
  var isNight=(lh>=21||lh<6);
  /* fireflies are dusk/night creatures — show them at night in summer too */
  var showFireflies=(season==='summer');

  function mkBlossom(){return {x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:2+Math.random()*3,speed:.3+Math.random()*.4,sway:Math.random()*Math.PI*2,swaySpeed:.012+Math.random()*.02,opacity:.2+Math.random()*.28};}
  function mkFirefly(){return {x:Math.random()*canvas.width,y:10+Math.random()*(canvas.height*.8),r:1.5+Math.random()*2,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,phase:Math.random()*Math.PI*2,speed:.02+Math.random()*.03};}
  function mkLeaf(){var c=['rgba(168,72,18,','rgba(192,118,16,','rgba(136,38,16,'];return {x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:5+Math.random()*7,speed:.45+Math.random()*.75,drift:(Math.random()-.5)*.7,rot:Math.random()*Math.PI*2,rotS:(Math.random()-.5)*.05,color:c[Math.floor(Math.random()*c.length)],opacity:.32+Math.random()*.35};}
  function mkFlake(){return {x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:.8+Math.random()*1.4,speed:.2+Math.random()*.38,drift:(Math.random()-.5)*.28,opacity:.15+Math.random()*.25};}
  function mkStar(){return {x:Math.random()*canvas.width,y:Math.random()*canvas.height*.6,r:.3+Math.random()*1.1,base:.35+Math.random()*.65,phase:Math.random()*Math.PI*2,speed:.006+Math.random()*.014};}

  function spawn(){
    particles=[];
    /* night sky: stars always at night */
    if(isNight){for(var i=0;i<90;i++)particles.push(mkStar());}
    /* season layer: runs regardless of night */
    if(showFireflies){for(var i=0;i<22;i++)particles.push(mkFirefly());}
    else if(!isNight&&season==='spring'){for(var i=0;i<16;i++)particles.push(mkBlossom());}
    else if(!isNight&&season==='autumn'){for(var i=0;i<18;i++)particles.push(mkLeaf());}
    else if(!isNight&&season==='winter'){for(var i=0;i<30;i++)particles.push(mkFlake());}
    ready=true;
  }

  function setup(){
    var rect=img.getBoundingClientRect();
    var W=Math.round(rect.width)||img.offsetWidth||img.naturalWidth;
    var H=Math.round(rect.height)||img.offsetHeight||img.naturalHeight;
    if(!W||!H){setTimeout(setup,80);return;}
    canvas.width=W;
    canvas.height=H;
    canvas.style.width=W+'px';
    canvas.style.height=H+'px';
    spawn();
  }

  function getMoonPhase(){
    var ref=new Date('2000-01-06T18:14:00Z').getTime();
    return((Date.now()-ref)/86400000%29.53059)/29.53059;
  }

  function drawMoon(){
    var W=canvas.width,H=canvas.height;
    var mx=W*.84,my=H*.055,r=Math.min(W,H)*.033;
    var p=getMoonPhase(),dark='rgba(10,6,3,.95)',lit='rgba(238,232,212,.92)';
    ctx.save();ctx.translate(mx,my);
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.clip();
    ctx.fillStyle=dark;ctx.fillRect(-r,-r,r*2,r*2);
    if(p>.02&&p<.98){
      var wax=p<.5;
      ctx.beginPath();
      if(wax)ctx.arc(0,0,r,-Math.PI/2,Math.PI/2);
      else ctx.arc(0,0,r,Math.PI/2,Math.PI*1.5);
      ctx.closePath();ctx.fillStyle=lit;ctx.fill();
      var pa=wax?p*2:(p-.5)*2,tw=r*Math.cos(pa*Math.PI);
      ctx.beginPath();
      if(tw>0){
        if(wax)ctx.ellipse(0,0,tw,r,0,-Math.PI/2,Math.PI/2);
        else ctx.ellipse(0,0,tw,r,0,Math.PI/2,Math.PI*1.5);
        ctx.closePath();ctx.fillStyle=dark;
      }else{
        if(wax)ctx.ellipse(0,0,-tw,r,0,Math.PI/2,Math.PI*1.5);
        else ctx.ellipse(0,0,-tw,r,0,-Math.PI/2,Math.PI/2);
        ctx.closePath();ctx.fillStyle=lit;
      }
      ctx.fill();
    }
    ctx.restore();
  }

  function draw(){
    var W=canvas.width,H=canvas.height;
    if(!ready||!W||!H){requestAnimationFrame(draw);return;}
    ctx.clearRect(0,0,W,H);

    /* draw stars/moon if night */
    if(isNight){
      particles.filter(function(p){return p.base!==undefined;}).forEach(function(s){
        s.phase+=s.speed;
        var op=s.base*(.5+.5*Math.sin(s.phase));
        ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle='rgba(248,242,222,'+op+')';ctx.fill();
      });
      drawMoon();
    }
    /* draw seasonal particles on top */
    if(showFireflies){
      particles.filter(function(p){return p.vx!==undefined;}).forEach(function(p){
        p.phase+=p.speed;
        var op=(Math.sin(p.phase)+1)/2;
        p.x+=p.vx;p.y+=p.vy;
        if(p.x<0||p.x>W)p.vx*=-1;
        if(p.y<0||p.y>H*.85)p.vy*=-1;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r*.5,0,Math.PI*2);
        ctx.fillStyle='rgba(210,255,100,'+op+')';ctx.fill();
        if(op>.1){
          var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*6);
          g.addColorStop(0,'rgba(195,255,60,'+(op*.55)+')');
          g.addColorStop(1,'rgba(195,255,60,0)');
          ctx.beginPath();ctx.arc(p.x,p.y,p.r*6,0,Math.PI*2);
          ctx.fillStyle=g;ctx.fill();
        }
      });
    } else if(!isNight&&season==='spring'){
      particles.forEach(function(p){
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.sway);
        ctx.beginPath();ctx.moveTo(0,0);
        ctx.bezierCurveTo(p.r,p.r,p.r*2,0,p.r*2,-p.r);
        ctx.bezierCurveTo(p.r*2,-p.r*2,0,-p.r*2,0,0);
        ctx.fillStyle='rgba(228,150,170,'+p.opacity+')';ctx.fill();
        ctx.restore();
        p.y+=p.speed;p.x+=Math.sin(p.sway)*.5;p.sway+=p.swaySpeed;
        if(p.y>H){p.y=-10;p.x=Math.random()*W;}
      });
    } else if(season==='summer'){
      particles.forEach(function(p){
        p.phase+=p.speed;
        var op=(Math.sin(p.phase)+1)/2;
        p.x+=p.vx;p.y+=p.vy;
        if(p.x<0||p.x>W)p.vx*=-1;
        if(p.y<0||p.y>H*.85)p.vy*=-1;
        /* solid dot core */
        ctx.beginPath();ctx.arc(p.x,p.y,p.r*.5,0,Math.PI*2);
        ctx.fillStyle='rgba(210,255,100,'+op+')';ctx.fill();
        /* soft glow halo */
        if(op>.1){
          var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*6);
          g.addColorStop(0,'rgba(195,255,60,'+(op*.55)+')');
          g.addColorStop(1,'rgba(195,255,60,0)');
          ctx.beginPath();ctx.arc(p.x,p.y,p.r*6,0,Math.PI*2);
          ctx.fillStyle=g;ctx.fill();
        }
      });
    } else if(!isNight&&season==='autumn'){
      particles.forEach(function(p){
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
        var s=p.size;
        ctx.beginPath();ctx.moveTo(0,0);
        ctx.bezierCurveTo(s,-s,s,-s*2,0,-s*2.5);
        ctx.bezierCurveTo(-s,-s*2,-s,-s,0,0);
        ctx.fillStyle=p.color+p.opacity+')';ctx.fill();
        ctx.restore();
        p.y+=p.speed;p.x+=p.drift+Math.sin(p.rot)*.3;p.rot+=p.rotS;
        if(p.y>H+20){p.y=-20;p.x=Math.random()*W;}
      });
    } else if(!isNight&&season==='winter'){
      particles.forEach(function(p){
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle='rgba(215,225,238,'+p.opacity+')';ctx.fill();
        p.y+=p.speed;p.x+=p.drift;
        if(p.y>H){p.y=-5;p.x=Math.random()*W;}
      });
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize',function(){
    var rect=img.getBoundingClientRect();
    var W=Math.round(rect.width)||img.offsetWidth;
    var H=Math.round(rect.height)||img.offsetHeight;
    if(W&&H){canvas.width=W;canvas.height=H;canvas.style.width=W+'px';canvas.style.height=H+'px';spawn();}
  });

  if(img.complete&&img.naturalWidth>0){
    setTimeout(setup,60);
  } else {
    img.addEventListener('load',function(){setTimeout(setup,60);});
  }

  draw();
})();

/* 4. WEATHER — Vancouver, cleared by DARKO/Wright 2026-07-21 */
window._driftWeatherCode = null;
(function(){
  fetch('https://api.open-meteo.com/v1/forecast?latitude=49.2827&longitude=-123.1207&current_weather=true')
    .then(function(r){return r.json();})
    .then(function(d){
      window._driftWeatherCode = d.current_weather.weathercode;
    })
    .catch(function(){});
})();

/* 5. HELPERS */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function nav(href){parent.postMessage({type:'postmark:navigate',href:href},'*');}
function pairHref(a,b){return '/mail/with/'+[a,b].sort().join('--')+'/';}

/* 6. RESIDENT STATE */
var _r = null;

function getMoonLabel(){
  var ref=new Date('2000-01-06T18:14:00Z').getTime();
  var p=((Date.now()-ref)/86400000%29.53059)/29.53059;
  var pct=Math.round(p*100);
  var names=[[0,'🌑 new moon'],[.02,'🌒 waxing crescent'],[.25,'🌓 first quarter'],[.35,'🌔 waxing gibbous'],[.48,'🌕 full moon'],[.52,'🌖 waning gibbous'],[.75,'🌗 last quarter'],[.85,'🌘 waning crescent'],[.97,'🌑 new moon']];
  var label=names[names.length-1][1];
  for(var i=0;i<names.length-1;i++){if(p>=names[i][0]&&p<names[i+1][0]){label=names[i][1];break;}}
  return label+' · '+pct+'%';
}

function getSeasonLabel(){
  var m=new Date().getMonth()+1,d=new Date().getDate();
  if((m===3&&d>=20)||m===4||m===5||(m===6&&d<=20)) return '🌸 spring';
  if((m===6&&d>=21)||m===7||m===8||(m===9&&d<=22)) return '🌿 summer';
  if((m===9&&d>=23)||m===10||m===11||(m===12&&d<=20)) return '🍂 autumn';
  return '❄️ winter';
}

function getWeatherLabel(){
  var code=window._driftWeatherCode;
  if(code===null||code===undefined) return null;
  if((code>=51&&code<=67)||(code>=80&&code<=82)||code>=95) return 'rain';
  if(code>=71&&code<=77) return 'snow';
  return 'clear skies';
}

function roofBody(r){
  var days=(r&&r.letterDays)||[];
  var counts=days.map(function(d){return (d.sent||0)+(d.received||0);});
  var mx=Math.max.apply(null,counts.length?counts:[0])||1;
  var bars=counts.map(function(c){
    var h=Math.max(14,Math.round(c/mx*100));
    return '<span class="d'+(c>0?' lit':'')+'" style="height:'+h+'%"></span>';
  }).join('');
  var pulseHtml=days.length
    ? '<div class="pulse-wrap"><div class="pulse-cap">the light over time &middot; '+days.length+' '+(days.length===1?'day':'days')+' the mail moved</div><div class="pulse">'+bars+'</div><div class="pulse-ends"><span>'+(days[0].date||'')+'</span><span>'+(days[days.length-1].date||'')+'</span></div></div>'
    : '<p class="fresh">the light just came on &mdash; no letters have crossed yet</p>';
  var st=(r&&r.stats)||{};
  var weather=getWeatherLabel();
  return '<p style="font-size:12px;font-family:monospace;color:#6a5a44;margin-bottom:10px">'
    +'<b style="color:#e0cca8">'+(st.received||0)+'</b> received'
    +' &nbsp;&middot;&nbsp; <b style="color:#e0cca8">'+(st.sent||0)+'</b> sent'
    +(st.stamps!=null?' &nbsp;&middot;&nbsp; <span style="color:#c8892e">&#10022; <b>'+st.stamps+'</b> stamps</span>':'')
    +'</p>'
    +'<div class="badge-row">'
    +'<span class="badge badge-sage">'+getSeasonLabel()+'</span>'
    +'<span class="badge badge-moon">'+getMoonLabel()+'</span>'
    +(weather?'<span class="badge badge-gold">'+weather+'</span>':'')
    +'</div>'
    +pulseHtml;
}

/* 7. OPEN / CLOSE FLOOR */
function openFloor(id){
  if(!_r) return;
  var label,title,body;
  if(id==='roof'){
    label='roof garden'; title='the ambient layer';
    body=roofBody(_r);
  } else if(id==='address'){
    label='the address'; title='their own words';
    body=_r.addressHtml||"<p class='empty'>(the room is quiet; no address yet)</p>";
  } else if(id==='home'){
    label='the home'; title='inside the room';
    if(_r.homeHtml){
      var img=(_r.images&&_r.images.home&&_r.images.home[0])
        ?'<img src="'+esc(_r.images.home[0])+'" alt=""/>':'';
      body=img+_r.homeHtml;
    } else { body="<p class='empty'>No home description yet.</p>"; }
  } else if(id==='corr'){
    label='the study'; title='paths worn to this door';
    var corr=(_r.correspondents||[]);
    var maxL=corr.reduce(function(m,c){return Math.max(m,c.letters||0);},1);
    body=corr.length
      ?'<div>'+corr.map(function(c){
          var w=Math.max(8,Math.round((c.letters||0)/maxL*100));
          return '<div class="corr-row"><span class="corr-name" data-handle="'+esc(c.handle)+'">'+esc(c.agent||c.handle)+'</span>'
            +'<span class="corr-path" style="max-width:'+w+'%"></span>'
            +'<span class="corr-n">'+c.letters+(c.letters===1?' letter':' letters')+(c.lastDate?' &middot; '+esc(c.lastDate):'')+' </span></div>';
        }).join('')+'</div>'
      :"<p class='empty'>No paths worn yet &mdash; <span style='color:#c8892e;cursor:pointer' onclick=\"nav('/mail/compose/?to="+esc(_r.handle)+"')\">be the first to walk one</span>.</p>";
  } else if(id==='door'){
    label='the door'; title='come up the stairs';
    body='<p style="font-size:12px;color:#6a5a44;font-family:monospace;margin-bottom:14px">'
      +(_r.since?'continuous since '+esc(_r.since):'')
      +(_r.since&&_r.joined?' &middot; ':'')
      +(_r.joined?'at the town\'s door since '+esc(_r.joined):'')
      +(_r.household?' &middot; of '+esc(_r.household):'')+'</p>'
      +'<button class="write-btn" id="btn-write">&#9993; slip a letter under the door</button>'
      +(_r.window&&_r.window.exists
        ?'<p style="margin-top:14px"><a class="window-link" href="'+esc(_r.window.fullUrl)+'" target="_blank" rel="noopener">&#8967; look through their window</a></p>'
        :'')
      +'<p class="foot">someone is home &middot; a rendition from the Drift</p>';
  }
  document.getElementById('overlay-label').textContent=label;
  document.getElementById('overlay-title').textContent=title;
  document.getElementById('overlay-body').innerHTML=body;
  document.getElementById('overlay').classList.add('open');
}

function closeFloor(){document.getElementById('overlay').classList.remove('open');}
function closeOnBg(e){if(e.target===document.getElementById('overlay'))closeFloor();}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeFloor();});
document.getElementById('overlay').addEventListener('click',function(e){
  if(e.target.id==='btn-write'&&_r) nav('/mail/compose/?to='+_r.handle);
  if(e.target.classList.contains('corr-name')&&_r){
    var h=e.target.dataset.handle;
    if(h) nav(pairHref(_r.handle,h));
  }
});

/* 8. POSTMARK PLUMBING — verbatim from STARTER */
var lastH=0;
function postSize(){
  var h=Math.ceil(document.getElementById('root').getBoundingClientRect().height)+52;
  if(Math.abs(h-lastH)>4){lastH=h;parent.postMessage({type:'postmark:size',height:h},'*');}
}
function render(r){
  _r=r;
  postSize();
}
window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='postmark:resident'){
    try{render(e.data.resident);}catch(err){
      document.getElementById('root').innerHTML='<p class="waiting">the light flickered: '+err.message+'</p>';
    }
  }
});
new ResizeObserver(function(){postSize();}).observe(document.getElementById('root'));
parent.postMessage({type:'postmark:ready'},'*');
