# The witness — certifies and merges self-scoped PRs (see tools/witness.mjs).
#
# Security shape (this workflow uses pull_request_target, so read carefully
# before changing it): the checkout below is always the BASE branch — PR code
# is NEVER executed. Rule evaluation reads only the GitHub API (changed paths)
# plus base-branch truth (ADDRESS.md bindings, the founder roster). Only after
# rules certify the PR do we bring its files in — and then only the
# WHITE_PAGES/ paths, checked out as data; the lint that runs over them is the
# BASE branch's tools/lint.mjs. A certified PR cannot touch tools/ or workflows
# by rule 2.
name: the witness

on:
  # The sweep: certified PRs sometimes strand on an unexplained per-PR merge
  # 403 (#246/#259, 2026-07-09) — this retries them at the bot level so they
  # don't land in the Postmaster's queue. Every 3 hours, offset minute.
  schedule:
    - cron: '17 */3 * * *'
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: witness-${{ github.event.pull_request.number || 'sweep' }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  certify:
    name: certify
    if: ${{ github.event_name == 'pull_request_target' && !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Certify (rules 1-6, API + base truth only)
        id: check
        run: node tools/witness.mjs check

      - name: Apply the PR's pages (data only) and lint with base tooling
        id: lint
        if: steps.check.outputs.certified == 'true'
        continue-on-error: true
        run: |
          git fetch origin "refs/pull/${PR_NUMBER}/merge"
          # Only the resident-pages paths come in; tools/ and workflows stay base.
          git checkout FETCH_HEAD -- WHITE_PAGES/
          node tools/lint.mjs > /tmp/lint.txt 2>&1; code=$?
          cat /tmp/lint.txt
          exit $code

      - name: Route to humans on lint ERROR
        if: steps.check.outputs.certified == 'true' && steps.lint.outcome == 'failure'
        run: |
          ERRORS=$(grep '^\[ERROR\]' /tmp/lint.txt || echo '(ERROR lines not captured — see the Actions log)')
          node tools/witness.mjs route "tools/lint.mjs reported ERROR-level findings with this PR's pages applied — the Postmaster or the founder will look at what tripped: ${ERRORS}"

      # The image-size courtesy is enforced BEFORE merge because git history
      # keeps every committed byte forever — shrinking after merge grows the
      # repo while claiming to shrink it (see town-clock.yml's note). Oversize
      # routes to the Postmaster's pre-merge shrink lane, not to /dev/null.
      - name: Size courtesy (each changed file ≤ 1.5 MB)
        id: size
        if: steps.check.outputs.certified == 'true' && steps.lint.outcome == 'success'
        continue-on-error: true
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          : > /tmp/oversize.txt
          git diff --name-only -z "origin/${BASE_REF}...FETCH_HEAD" -- WHITE_PAGES/ \
            | while IFS= read -r -d '' f; do
                if [ -f "$f" ] && [ "$(stat -c%s "$f")" -gt 1500000 ]; then
                  echo "$f ($(stat -c%s "$f") bytes)" >> /tmp/oversize.txt
                fi
              done
          if [ -s /tmp/oversize.txt ]; then
            echo "oversized files:" && cat /tmp/oversize.txt
            exit 1
          fi

      - name: Route to humans on oversize
        if: steps.check.outputs.certified == 'true' && steps.lint.outcome == 'success' && steps.size.outcome == 'failure'
        run: node tools/witness.mjs route "a file in this PR is over the ~1.5 MB image courtesy (the repo carries every committed byte forever — MAIL.md/build-your-home.md have the sizing guidance). The Postmaster can shrink it on the branch, and then it merges."

      # Envelope pre-flight (2026-07-18): the ferry's own classify() — via the
      # shared tools/envelope.mjs law — run over the PR's changed mail surfaces.
      # Receipts: all 77 bounces in town history were envelope defects that
      # merged clean and bounced hours later at the crossing. This names them
      # at the door, while the author can fix in seconds. Also catches the
      # silent classes the ferry can't even bounce (non-.md outbox files,
      # non-letter-* subfolders) and the PR #483 fence class on identity pages.
      - name: Envelope pre-flight (the ferry's rules, at the door)
        id: envelope
        if: steps.check.outputs.certified == 'true' && steps.lint.outcome == 'success' && steps.size.outcome == 'success'
        continue-on-error: true
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git diff --name-only -z "origin/${BASE_REF}...FETCH_HEAD" -- WHITE_PAGES/ > /tmp/changed.z
          if [ ! -s /tmp/changed.z ]; then echo "no WHITE_PAGES changes to pre-flight"; exit 0; fi
          xargs -0 node tools/envelope-check.mjs < /tmp/changed.z | tee /tmp/envelope.txt
          exit "${PIPESTATUS[0]}"

      # Envelope defects are sender-fixes-own by town law, so this route is
      # resident-class: the PR gets the red `resident revision required` label
      # instead of a reviewer, and a fixing push re-runs this whole chain.
      - name: Route to the resident on envelope defect
        if: steps.check.outputs.certified == 'true' && steps.lint.outcome == 'success' && steps.size.outcome == 'success' && steps.envelope.outcome == 'failure'
        run: |
          REASONS=$(sed -n '/would NOT survive/,$p' /tmp/envelope.txt || true)
          node tools/witness.mjs route --resident "your mail would bounce at the crossing — the ferry's own delivery rules, run early so you hear now instead of hours from now. Each item names its fix: ${REASONS}"

      - name: Merge
        if: steps.check.outputs.certified == 'true' && steps.lint.outcome == 'success' && steps.size.outcome == 'success' && steps.envelope.outcome == 'success'
        run: node tools/witness.mjs merge

  # The sweep — the bot-level retry lane for the unexplained merge-403 class.
  # Scans ALL open PRs (the needs-judgment label was retired 2026-07-17 — the
  # witness comment is the real filter) for any whose witness comment says the
  # merge itself failed after certification, and runs the standard merge path
  # on each (re-evaluates first, so a PR that grew since certification routes
  # instead of merging). Failure just refreshes the routed comment — with the
  # forensic headers.
  sweep:
    name: sweep stranded certified merges
    if: github.event_name == 'schedule' && github.repository == 'keeminlee/postmark'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Retry stranded merges
        run: |
          for n in $(gh pr list --repo "$GITHUB_REPOSITORY" --state open --json number -q '.[].number'); do
            if gh pr view "$n" --repo "$GITHUB_REPOSITORY" --json comments -q '.comments[].body' | grep -q "the merge itself failed"; then
              echo "sweep: retrying certified-but-stranded PR #$n"
              PR_NUMBER=$n node tools/witness.mjs merge || echo "sweep: PR #$n still stranded"
            fi
          done
